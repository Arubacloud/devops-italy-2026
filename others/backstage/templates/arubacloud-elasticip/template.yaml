apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: arubacloud-elasticip
  title: Create ArubaCloud ElasticIp
  description: Creates an ElasticIp CR (arubacloud.com/v1alpha1) and opens a PR to the GitOps repo. After merge, Argo CD applies it.
spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  parameters:
    - title: ElasticIp details
      required:
        - name
        - tenant
        - location
        - billingPeriod
        - projectName
        - githubToken
      properties:
        name:
          title: Name
          description: ElasticIp name (metadata.name)
          type: string
          ui:autofocus: true
        tenant:
          title: Tenant
          description: Tenant identifier
          type: string
        location:
          title: Location
          description: Location value for the elastic IP
          type: string
          enum:
            - ITBG-Bergamo
          default: ITBG-Bergamo
        billingPeriod:
          title: Billing period
          description: Billing period for the resource
          type: string
          enum:
            - Hour
          default: Hour
        projectName:
          title: Project name
          description: Name of the referenced Project CR
          type: string
        tags:
          title: Tags
          description: Optional list of tags
          type: array
          items:
            type: string
          default: []
        githubToken:
          title: GitHub token
          description: Personal access token (repo scope) to create the PR. Not stored by Backstage.
          type: string
          ui:widget: password

  steps:
    - id: fetch-skeleton
      name: Fetch ElasticIp CR skeleton
      action: fetch:template
      input:
        url: https://github.com/Arubacloud/devops-italy-2026/tree/main/others/backstage/gitops-skeleton-elasticip
        targetPath: content
        token: ${{ parameters.githubToken }}
        templateFileExtension: true
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.tenant }}
          tenant: ${{ parameters.tenant }}
          tags: ${{ parameters.tags }}
          location: ${{ parameters.location }}
          billingPeriod: ${{ parameters.billingPeriod }}
          projectName: ${{ parameters.projectName }}
          projectNamespace: ${{ parameters.tenant }}

    - id: ensure-tenant-app-dir
      name: Ensure tenant ArgoCD app directory and tenant Application
      action: roadiehq:utils:fs:write
      input:
        path: content/argocd/applications/${{ parameters.tenant }}
        content: |
          # This directory will hold all ArgoCD Applications for tenant ${{ parameters.tenant }}
          # The Application "${{ parameters.tenant }}.yaml" in argocd/tenants/ will watch this folder.

    - id: ensure-tenant-app-of-apps
      name: Create tenant ArgoCD Application (App of Apps)
      action: roadiehq:utils:fs:write
      input:
        path: content/argocd/tenants/${{ parameters.tenant }}.yaml
        content: |
          # ArgoCD Application (App of Apps) for tenant ${{ parameters.tenant }}
          # Watches argocd/applications/${{ parameters.tenant }} and syncs all YAML files found there
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${{ parameters.tenant }}
            namespace: argocd
          spec:
            project: default

            source:
              repoURL: https://github.com/Arubacloud/devops-italy-2026.git
              targetRevision: HEAD
              path: argocd/applications/${{ parameters.tenant }}

              # Directory mode: recursive scan of all YAML files under the path
              directory:
                recurse: true   # Scan subdirectories for application definitions

            destination:
              server: https://kubernetes.default.svc
              namespace: argocd

            syncPolicy:
              automated:
                prune: true     # Remove applications when file is deleted from Git
                selfHeal: true  # Automatically sync when files change in Git
              syncOptions:
                - CreateNamespace=true   # Create tenant namespaces when they appear in manifests
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m

    - id: rename-output
      name: Move elasticIp CR into tenant folder
      action: fs:rename
      input:
        files:
          - from: content/elasticip.yaml
            to: content/argocd/applications/${{ parameters.tenant }}/project-${{ parameters.projectName }}-elasticip-${{ parameters.name }}.yaml

    - id: create-pr
      name: Open PR to GitOps repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Arubacloud&repo=devops-italy-2026
        branchName: backstage/${{ parameters.tenant }}-project-${{ parameters.projectName }}-elasticip-${{ parameters.name }}
        token: ${{ parameters.githubToken }}
        title: Add ArubaCloud ElasticIp CR - ${{ parameters.name }} for project ${{ parameters.projectName }} - tenant ${{ parameters.tenant }}
        description: |
          Adds ElasticIp Custom Resource (arubacloud.com/v1alpha1) for **${{ parameters.name }}**.
          After merging, Argo CD will sync and apply the resource.
        sourcePath: content
        targetPath: argocd/applications/arubacloud-elasticips/
        targetBranchName: main

  output:
    links:
      - title: Open pull request
        url: ${{ steps.create-pr.output.remoteUrl }}/pull/${{ steps.create-pr.output.pullRequestNumber }}
        icon: pull-request
