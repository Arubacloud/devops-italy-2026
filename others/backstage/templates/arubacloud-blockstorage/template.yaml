apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: arubacloud-blockstorage
  title: Create ArubaCloud BlockStorage
  description: Creates a BlockStorage CR (arubacloud.com/v1alpha1) and opens a PR to the GitOps repo. After merge, Argo CD applies it.
spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  parameters:
    - title: BlockStorage details
      required:
        - name
        - tenant
        - location
        - sizeGb
        - billingPeriod
        - dataCenter
        - bootable
        - image
        - projectName
        - githubToken
      properties:
        name:
          title: Name
          description: BlockStorage name (metadata.name)
          type: string
          ui:autofocus: true
        tenant:
          title: Tenant
          description: Tenant identifier
          type: string
        location:
          title: Location
          description: Location value for the block storage
          type: string
          enum:
            - ITBG-Bergamo
          default: ITBG-Bergamo
        sizeGb:
          title: Size (GB)
          description: Block storage size in GB
          type: integer
        billingPeriod:
          title: Billing period
          description: Billing period for the resource
          type: string
          enum:
            - Hour
          default: Hour
        dataCenter:
          title: Zone
          description: Zone for the block storage (ITBG-1, ITBG-2, ITBG-3)
          type: string
          enum:
            - ITBG-1
            - ITBG-2
            - ITBG-3
          default: ITBG-1
        bootable:
          title: Bootable
          description: Whether the volume is bootable
          type: boolean
        image:
          title: Image
          description: Image reference for bootable volumes
          type: string
          enum:
            - alma8
            - DE11-001
            - osuse15_2_x64_1_0
            - alma9
            - WS19-001_W2K19_1_0
            - DE12-001
            - LU22-001
            - WS22-001_W2K22_1_0
            - LU20-001
            - LU24-001
          default: alma9
        projectName:
          title: Project name
          description: Name of the referenced Project CR
          type: string
        tags:
          title: Tags
          description: Optional list of tags
          type: array
          items:
            type: string
          default: []
        githubToken:
          title: GitHub token
          description: Personal access token (repo scope) to create the PR. Not stored by Backstage.
          type: string
          ui:widget: password

  steps:
    - id: fetch-skeleton
      name: Fetch BlockStorage CR skeleton
      action: fetch:template
      input:
        url: https://github.com/Arubacloud/devops-italy-2026/tree/main/others/backstage/gitops-skeleton-blockstorage
        targetPath: content
        token: ${{ parameters.githubToken }}
        templateFileExtension: true
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.tenant }}
          tenant: ${{ parameters.tenant }}
          tags: ${{ parameters.tags }}
          location: ${{ parameters.location }}
          sizeGb: ${{ parameters.sizeGb }}
          billingPeriod: ${{ parameters.billingPeriod }}
          dataCenter: ${{ parameters.dataCenter }}
          bootable: ${{ parameters.bootable }}
          image: ${{ parameters.image }}
          projectName: ${{ parameters.projectName }}
          projectNamespace: ${{ parameters.tenant }}

    - id: ensure-tenant-app-dir
      name: Ensure tenant ArgoCD app directory and tenant Application
      action: roadiehq:utils:fs:write
      input:
        path: content/argocd/applications/${{ parameters.tenant }}
        content: |
          # This directory will hold all ArgoCD Applications for tenant ${{ parameters.tenant }}
          # The Application "${{ parameters.tenant }}.yaml" in argocd/tenants/ will watch this folder.

    - id: ensure-tenant-app-of-apps
      name: Create tenant ArgoCD Application (App of Apps)
      action: roadiehq:utils:fs:write
      input:
        path: content/argocd/tenants/${{ parameters.tenant }}.yaml
        content: |
          # ArgoCD Application (App of Apps) for tenant ${{ parameters.tenant }}
          # Watches argocd/applications/${{ parameters.tenant }} and syncs all YAML files found there
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${{ parameters.tenant }}
            namespace: argocd
          spec:
            project: default

            source:
              repoURL: https://github.com/Arubacloud/devops-italy-2026.git
              targetRevision: HEAD
              path: argocd/applications/${{ parameters.tenant }}

              # Directory mode: recursive scan of all YAML files under the path
              directory:
                recurse: true   # Scan subdirectories for application definitions

            destination:
              server: https://kubernetes.default.svc
              namespace: argocd

            syncPolicy:
              automated:
                prune: true     # Remove applications when file is deleted from Git
                selfHeal: true  # Automatically sync when files change in Git
              syncOptions:
                - CreateNamespace=true   # Create tenant namespaces when they appear in manifests
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m
                  
    - id: rename-output
      name: Move blockStorage CR into tenant folder
      action: fs:rename
      input:
        files:
          - from: content/blockstorage.yaml
            to:  content/argocd/applications/${{ parameters.tenant }}/project-${{ parameters.projectName }}-blockstorage-${{ parameters.name }}.yaml

    - id: create-pr
      name: Open PR to GitOps repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Arubacloud&repo=devops-italy-2026
        branchName: backstage/${{ parameters.tenant }}-project-${{ parameters.projectName }}-blockstorage-${{ parameters.name }}
        token: ${{ parameters.githubToken }}
        title: Add ArubaCloud BlockStorage CR - ${{ parameters.name }}
        description: |
          Adds BlockStorage Custom Resource (arubacloud.com/v1alpha1) for **${{ parameters.name }}**.
          After merging, Argo CD will sync and apply the resource.
        sourcePath: content
        targetPath: argocd/applications/arubacloud-blockstorages/
        targetBranchName: main

  output:
    links:
      - title: Open pull request
        url: ${{ steps.create-pr.output.remoteUrl }}/pull/${{ steps.create-pr.output.pullRequestNumber }}
        icon: pull-request
