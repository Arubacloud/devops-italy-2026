apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: arubacloud-blockstorage
  title: Create ArubaCloud BlockStorage
  description: Creates a BlockStorage CR (arubacloud.com/v1alpha1) and opens a PR to the GitOps repo. After merge, Argo CD applies it.
spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  parameters:
    - title: BlockStorage details
      required:
        - name
        - tenant
        - location
        - sizeGb
        - billingPeriod
        - dataCenter
        - image
        - projectName
        - githubToken
      properties:
        name:
          title: Name
          description: BlockStorage name (metadata.name)
          type: string
          ui:autofocus: true
        tenant:
          title: Tenant
          description: Tenant identifier
          type: string
        location:
          title: Location
          description: Location value for the block storage
          type: string
          enum:
            - ITBG-Bergamo
          default: ITBG-Bergamo
        sizeGb:
          title: Size (GB)
          description: Block storage size in GB
          type: integer
        billingPeriod:
          title: Billing period
          description: Billing period for the resource
          type: string
          enum:
            - Hour
          default: Hour
        dataCenter:
          title: Zone
          description: Zone for the block storage (ITBG-1, ITBG-2, ITBG-3)
          type: string
          enum:
            - ITBG-1
            - ITBG-2
            - ITBG-3
          default: ITBG-1
        bootable:
          title: Bootable
          description: "Whether the volume is bootable (if not set, the CR will have bootable: false)."
          type: boolean
          default: false
        image:
          title: Image
          description: Image reference for bootable volumes
          type: string
          enum:
            - alma8
            - DE11-001
            - osuse15_2_x64_1_0
            - alma9
            - WS19-001_W2K19_1_0
            - DE12-001
            - LU22-001
            - WS22-001_W2K22_1_0
            - LU20-001
            - LU24-001
          default: alma9
        projectName:
          title: Project name
          description: Name of the referenced Project CR
          type: string
        tags:
          title: Tags
          description: Optional list of tags
          type: array
          items:
            type: string
          default: []
        githubToken:
          title: GitHub token
          description: Personal access token (repo scope) to create the PR. Not stored by Backstage.
          type: string
          ui:widget: password

  steps:
    - id: fetch-skeleton
      name: Fetch BlockStorage CR skeleton
      action: fetch:template
      input:
        url: https://github.com/Arubacloud/devops-italy-2026/tree/main/others/backstage/gitops-skeleton-blockstorage
        targetPath: ./argocd/applications/${{ parameters.tenant }}
        token: ${{ parameters.githubToken }}
        templateFileExtension: true
        values:
          name: ${{ parameters.name }}
          namespace: tenant-${{ parameters.tenant }}
          tenant: ${{ parameters.tenant }}
          tags: ${{ parameters.tags }}
          location: ${{ parameters.location }}
          sizeGb: ${{ parameters.sizeGb }}
          billingPeriod: ${{ parameters.billingPeriod }}
          dataCenter: ${{ parameters.dataCenter }}
          bootable: ${{ parameters.bootable }}
          image: ${{ parameters.image }}
          projectName: ${{ parameters.projectName }}
          projectNamespace: tenant-${{ parameters.tenant }}

    - id: create-pr
      name: Open PR to GitOps repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Arubacloud&repo=devops-italy-2026
        branchName: backstage/${{ parameters.tenant }}-project-${{ parameters.projectName }}-blockstorage-${{ parameters.name }}
        token: ${{ parameters.githubToken }}
        title: Add ArubaCloud BlockStorage CR - ${{ parameters.name }}
        description: |
          ## Summary
          Adds BlockStorage CR (arubacloud.com/v1alpha1) **${{ parameters.name }}** for project **${{ parameters.projectName }}** in tenant **${{ parameters.tenant }}**.

          ## Files added
          - `argocd/applications/${{ parameters.tenant }}/project-${{ parameters.projectName }}-blockstorage-${{ parameters.name }}.yaml`

          ## After merge
          Argo CD will sync and apply the resource.
        sourcePath: ./
        targetPath: .

  output:
    links:
      - title: Open pull request
        url: ${{ steps.create-pr.output.remoteUrl }}/pull/${{ steps.create-pr.output.pullRequestNumber }}
        icon: pull-request
