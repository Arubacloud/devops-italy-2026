apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: arubacloud-blockstorage
  title: Create ArubaCloud BlockStorage
  description: Creates a BlockStorage CR (arubacloud.com/v1alpha1) and opens a PR to the GitOps repo. After merge, Argo CD applies it.
spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  parameters:
    - title: BlockStorage details
      required:
        - name
        - namespace
        - tenant
        - location
        - sizeGb
        - billingPeriod
        - dataCenter
        - bootable
        - image
        - projectName
        - projectNamespace
        - githubToken
      properties:
        name:
          title: Name
          description: BlockStorage name (metadata.name)
          type: string
          ui:autofocus: true
        namespace:
          title: Namespace
          description: Target Kubernetes namespace
          type: string
          default: default
        tenant:
          title: Tenant
          description: Tenant identifier
          type: string
        location:
          title: Location
          description: Location value for the block storage
          type: string
        sizeGb:
          title: Size (GB)
          description: Block storage size in GB
          type: integer
        billingPeriod:
          title: Billing period
          description: Billing period for the resource
          type: string
        dataCenter:
          title: Data center
          description: Data center identifier
          type: string
        bootable:
          title: Bootable
          description: Whether the volume is bootable
          type: boolean
        image:
          title: Image
          description: Image reference for bootable volumes
          type: string
        projectName:
          title: Project name
          description: Name of the referenced Project CR
          type: string
        projectNamespace:
          title: Project namespace
          description: Namespace of the referenced Project CR
          type: string
          default: default
        tags:
          title: Tags
          description: Optional list of tags
          type: array
          items:
            type: string
          default: []
        githubToken:
          title: GitHub token
          description: Personal access token (repo scope) to create the PR. Not stored by Backstage.
          type: string
          ui:widget: password

  steps:
    - id: fetch-skeleton
      name: Fetch BlockStorage CR skeleton
      action: fetch:template
      input:
        url: https://github.com/Arubacloud/devops-italy-2026/tree/main/others/backstage/gitops-skeleton
        targetPath: content
        token: ${{ parameters.githubToken }}
        templateFileExtension: true
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          tenant: ${{ parameters.tenant }}
          tags: ${{ parameters.tags }}
          location: ${{ parameters.location }}
          sizeGb: ${{ parameters.sizeGb }}
          billingPeriod: ${{ parameters.billingPeriod }}
          dataCenter: ${{ parameters.dataCenter }}
          bootable: ${{ parameters.bootable }}
          image: ${{ parameters.image }}
          projectName: ${{ parameters.projectName }}
          projectNamespace: ${{ parameters.projectNamespace }}

    - id: rename-output
      name: Rename to tenant-blockstorage-name.yaml
      action: fs:rename
      input:
        files:
          - from: content/blockstorage.yaml
            to: content/${{ parameters.tenant }}-blockstorage-${{ parameters.name }}.yaml

    - id: cleanup-others
      name: Remove other rendered files
      action: fs:delete
      input:
        files:
          - content/project.yaml
          - content/elasticip.yaml

    - id: create-pr
      name: Open PR to GitOps repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Arubacloud&repo=devops-italy-2026
        branchName: backstage/blockstorage-${{ parameters.tenant }}-blockstorage-${{ parameters.name }}
        token: ${{ parameters.githubToken }}
        title: Add ArubaCloud BlockStorage CR - ${{ parameters.name }}
        description: |
          Adds BlockStorage Custom Resource (arubacloud.com/v1alpha1) for **${{ parameters.name }}**.
          After merging, Argo CD will sync and apply the resource.
        sourcePath: content
        targetPath: argocd/applications/arubacloud-blockstorages/
        targetBranchName: main

  output:
    links:
      - title: Open pull request
        url: ${{ steps.create-pr.output.remoteUrl }}/pull/${{ steps.create-pr.output.pullRequestNumber }}
        icon: pull-request
