apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: arubacloud-project
  title: Create ArubaCloud Project
  description: Creates a Project CR (arubacloud.com/v1alpha1) and opens a PR to the GitOps repo. After merge, Argo CD applies it.
spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  parameters:
    - title: Project details
      required:
        - name
        - tenant
        - githubToken
      properties:
        name:
          title: Name
          description: Project name (metadata.name)
          type: string
          ui:autofocus: true
        tenant:
          title: Tenant
          description: Tenant identifier for the project
          type: string
        description:
          title: Description
          description: Optional project description
          type: string
          default: ""
        tags:
          title: Tags
          description: Optional list of tags
          type: array
          items:
            type: string
          default: []
        default:
          title: Default project
          description: Whether this is the default project
          type: boolean
          default: false
        githubToken:
          title: GitHub token
          description: Personal access token (repo scope) to create the PR. Not stored by Backstage.
          type: string
          ui:widget: password
  steps:
    # 1. Fetch skeleton Project CR

    - id: fetch-skeleton
      name: Fetch Project CR skeleton
      action: fetch:template
      input:
        url: https://github.com/Arubacloud/devops-italy-2026/tree/main/others/backstage/gitops-skeleton-project
        targetPath: ./
        token: ${{ parameters.githubToken }}
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.tenant }}
          tenant: ${{ parameters.tenant }}
          description: ${{ parameters.description }}
          tags: ${{ parameters.tags }}
          default: ${{ parameters.default }}


    # 2. Make sure tenant app dir exists
    - id: fetch-tenant-dir
      name: Ensure tenant app dir marker (idempotent)
      action: fetch:plain:http
      input:
        url: data:text/plain;base64,LS0tDQojaX0JBY2tzdGFnZV9kaXJfbWFya2VyX2Zvcl9hcmdvY2QgdGVuYW50ICR7eyBwYXJhbWV0ZXJzLnRlbmFudCB9fX0K  # Marker unico
        targetPath: ./argocd/applications/${{ parameters.tenant }}/marker.txt  # File marker (non README per idempotenza)

    # 3. Apply App of Apps Pattern
    - id: fetch-app-of-apps
      name: Ensure tenant App of Apps (idempotent)
      action: fetch:plain:http
      input:
        targetPath: ./argocd/tenants/${{ parameters.tenant }}.yaml
        content: |  # Template Nunjucks
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${{ parameters.tenant }}
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/Arubacloud/devops-italy-2026.git
              targetRevision: HEAD
              path: argocd/applications/${{ parameters.tenant }}
              directory:
                recurse: true
            destination:
              server: https://kubernetes.default.svc
              namespace: argocd
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m

    # 4. Move project CR to tenant dir
    - id: prepare-project
      name: Move project CR to tenant dir
      action: fs:rename
      input:
        files:
          - from: ./project.yaml
            to: ./argocd/applications/${{ parameters.tenant }}/project-${{ parameters.name }}.yaml

    - id: create-pr
      name: Open PR to GitOps repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Arubacloud&repo=devops-italy-2026
        branchName: backstage/${{ parameters.tenant }}-project-${{ parameters.name }}
        token: ${{ parameters.githubToken }}
        title: Add ArubaCloud Project CR - ${{ parameters.name }} - tenant ${{ parameters.tenant }}
        description: |
          Adds Project Custom Resource (arubacloud.com/v1alpha1) for **${{ parameters.name }}**.
          After merging, Argo CD will sync and apply the resource.
        sourcePath: ./
        targetPath: .
        targetBranchName: main


  output:
    links:
      - title: Open pull request
        url: ${{ steps['create-pr'].output.remoteUrl }}/pull/${{ steps['create-pr'].output.pullRequestNumber }}
        icon: pull-request
