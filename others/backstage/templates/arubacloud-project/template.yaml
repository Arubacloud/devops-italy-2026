apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: arubacloud-project
  title: Create ArubaCloud Project
  description: Creates a Project CR (arubacloud.com/v1alpha1) and opens a PR to the GitOps repo. After merge, Argo CD applies it.
spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  parameters:
    - title: Project details
      required:
        - name
        - tenant
        - githubToken
      properties:
        name:
          title: Name
          description: Project name (metadata.name)
          type: string
          ui:autofocus: true
        tenant:
          title: Tenant
          description: Tenant identifier for the project
          type: string
        description:
          title: Description
          description: Optional project description
          type: string
          default: ""
        tags:
          title: Tags
          description: Optional list of tags
          type: array
          items:
            type: string
          default: []
        default:
          title: Default project
          description: Whether this is the default project
          type: boolean
          default: false
        githubToken:
          title: GitHub token
          description: Personal access token (repo scope) to create the PR. Not stored by Backstage.
          type: string
          ui:widget: password

  steps:
    - id: fetch-skeleton
      name: Fetch Project CR skeleton
      action: fetch:template
      input:
        url: https://github.com/Arubacloud/devops-italy-2026/tree/main/others/backstage/gitops-skeleton-project
        targetPath: content
        token: ${{ parameters.githubToken }}
        templateFileExtension: true
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.tenant }}
          tenant: ${{ parameters.tenant }}
          description: ${{ parameters.description }}
          tags: ${{ parameters.tags }}
          default: ${{ parameters.default }}

    - id: ensure-tenant-app-dir
      name: Ensure tenant ArgoCD app directory and tenant Application
      action: roadiehq:utils:fs:write
      input:
        path: content/argocd/applications/${{ parameters.tenant }}
        content: |
          # This directory will hold all ArgoCD Applications for tenant ${{ parameters.tenant }}
          # The Application "${{ parameters.tenant }}.yaml" in argocd/tenants/ will watch this folder.

    - id: ensure-tenant-app-of-apps
      name: Create tenant ArgoCD Application (App of Apps)
      action: roadiehq:utils:fs:write
      input:
        path: content/argocd/tenants/${{ parameters.tenant }}.yaml
        content: |
          # ArgoCD Application (App of Apps) for tenant ${{ parameters.tenant }}
          # Watches argocd/applications/${{ parameters.tenant }} and syncs all YAML files found there
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${{ parameters.tenant }}
            namespace: argocd
          spec:
            project: default

            source:
              repoURL: https://github.com/Arubacloud/devops-italy-2026.git
              targetRevision: HEAD
              path: argocd/applications/${{ parameters.tenant }}

              # Directory mode: recursive scan of all YAML files under the path
              directory:
                recurse: true   # Scan subdirectories for application definitions

            destination:
              server: https://kubernetes.default.svc
              namespace: argocd

            syncPolicy:
              automated:
                prune: true     # Remove applications when file is deleted from Git
                selfHeal: true  # Automatically sync when files change in Git
              syncOptions:
                - CreateNamespace=true   # Create tenant namespaces when they appear in manifests
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m

    - id: rename-output
      name: Move project CR into tenant folder
      action: fs:rename
      input:
        files:
          - from: content/project.yaml
            to: content/argocd/applications/${{ parameters.tenant }}/project-${{ parameters.name }}.yaml

    - id: create-pr
      name: Open PR to GitOps repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Arubacloud&repo=devops-italy-2026
        branchName: backstage/${{ parameters.tenant }}-project-${{ parameters.name }}
        token: ${{ parameters.githubToken }}
        title: Add ArubaCloud Project CR - ${{ parameters.name }} - tenant ${{ parameters.tenant }}
        description: |
          Adds Project Custom Resource (arubacloud.com/v1alpha1) for **${{ parameters.name }}**.
          After merging, Argo CD will sync and apply the resource.
        sourcePath: content
        targetPath: .
        targetBranchName: main

  output:
    links:
      - title: Open pull request
        url: ${{ steps.create-pr.output.remoteUrl }}/pull/${{ steps.create-pr.output.pullRequestNumber }}
        icon: pull-request