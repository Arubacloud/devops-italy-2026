# Bootstrap Application (App of Apps) – top-level applications only
# Watches argocd/applications/ (no recurse) and creates one Argo CD Application
# per YAML file directly in that directory (backstage, vault, etc.).
#
# Tenant-specific apps (argocd/applications/${tenant}/*) are managed by
# bootstrap-tenants → argocd/tenants/${tenant}.yaml, not by this bootstrap.
#
# Sync wave 1 so bootstrap-tenants (wave 0) reconciles tenants first.
# Applied by Terraform during cluster bootstrap
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/Arubacloud/devops-italy-2026.git
    targetRevision: HEAD
    path: argocd/applications
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

